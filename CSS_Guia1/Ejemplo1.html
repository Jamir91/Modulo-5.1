<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selectores de Clase, ID y Descendientes</title>
    <link rel="stylesheet" href="estilos1.css">
</head>
<body>
    <!-- Selector de ID -->
    <h1 id="titulo-principal">Título Único con ID</h1>

    <!-- Selector de Clase -->
    <p class="destacado">Este es un párrafo con una clase reutilizable.</p>
    <p class="destacado">Otro párrafo que comparte la misma clase.</p>

    <!-- Selector Descendiente -->
    <div class="caja">
        <p>Este párrafo es descendiente de un contenedor div.</p>
    </div>
</body>
</html>
